<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shaken Not Stored - View Secret</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #14141f;
      --border: #2a2a3a;
      --text: #e0e0e8;
      --muted: #8888a0;
      --accent: #6c63ff;
      --danger: #ff4757;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      max-width: 600px;
      width: 100%;
      padding: 2rem 1.5rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
      padding-top: 3rem;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 0.5rem;
    }

    header h1 span { color: var(--accent); }

    header a {
      color: var(--text);
      text-decoration: none;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    #loading {
      text-align: center;
      color: var(--muted);
      padding: 3rem 0;
    }

    button {
      width: 100%;
      padding: 0.9rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #7b73ff; }

    #secret-display {
      display: none;
    }

    #secret-display label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.5rem;
    }

    .message-content {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.95rem;
      line-height: 1.6;
      max-height: 400px;
      overflow-y: auto;
    }

    .destroyed-notice {
      text-align: center;
      color: var(--danger);
      font-size: 0.85rem;
      margin-top: 1rem;
      font-weight: 600;
    }

    #not-found {
      display: none;
      text-align: center;
    }

    #not-found .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    #not-found p {
      color: var(--muted);
      line-height: 1.6;
    }

    .home-link {
      display: inline-block;
      margin-top: 1.5rem;
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
      margin-top: auto;
      padding: 2rem 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1><a href="/">Shaken <span>Not Stored</span></a></h1>
    </header>

    <div class="card">
      <div id="loading">Retrieving secret...</div>

      <div id="secret-display">
        <label>Secret Message</label>
        <div class="message-content" id="message-content"></div>
        <div class="destroyed-notice">This message has been destroyed from the server.</div>
      </div>

      <div id="not-found">
        <div class="icon">&#128683;</div>
        <p>This secret has already been viewed,<br>has expired or never existed.</p>
        <a href="/" class="home-link">Create a new secret</a>
      </div>
    </div>

    <footer>
      Shaken Not Stored &mdash; Nothing is ever saved to disk.
    </footer>
  </div>

  <script src="/view.js" defer></script>
</body>
</html>
